pixhawk_comm:
  device: "/dev/ttl_pixhawk"       # ✅ Pixhawk 串口设备名
  baud: 115200
  timeout: 0.5

fish_comm:
  port: "/dev/ttl_fish_main"       # ✅ 仿生鱼串口
  baudrate: 460800
  timeout: 0.5

charging_comm:
  port: "/dev/ttl_charger"       # ✅ 充电模块串口
  baudrate: 460800
  timeout: 0.5

AprilTagCamera_Main:
  name: "UVC_Camera_Main"
  device: "/dev/camera_main"
  camera_id: 0
  tag_family: "tag36h11"
  marker_length: 0.092
  camera_matrix:
    - [342.10142903, 0, 310.67383732]
    - [0, 342.30795475, 251.8921935]
    - [0, 0, 1]
  dist_coeffs: [0.05423003, -0.05146786, -0.00032794, -0.00140946, -0.00136574]
  min_detections: 5
  max_lost: 3
  
  
  # camera_id: 0 表示使用 /dev/video0
  # marker_length: 0.05 表示标记物的实际长度为 5cm
  # camera_matrix 和 dist_coeffs 是相机的内参矩阵
  # 需要根据实际相机进行标定
  # File: rov_project/config/settings.yaml

vision_tracking:
  marker_type: "aruco"
  name: "Aruco_Camera_Main"
  device: "/dev/camera_main"
  camera_id: 0
  frame_width: 1920
  frame_height: 1080
  fourcc: "MJPG"
  fps: 30
  dictionary: "DICT_4X4_50"
  marker_id: 20
  marker_size_m: 0.04
  calibration_file: "rov_vision_calib-main/config/calib_underwater_20_50cm_1080p.yaml"
  dryrun_log_path: "logs/aruco_tracking_dryrun.csv"
  min_detections: 3
  max_lost: 10
  max_lost_frames: 10
  corner_refinement: true
  enable_undistort_preview: false
  enable_preview_annotations: true
  min_marker_pixel_size_px: 25.0
  max_reprojection_error_px: 5.0
  max_abs_position_m: 5.0
  max_abs_yaw_deg: 180.0
  camera_to_body:
    forward_axis: "y"
    forward_sign: -1.0
    right_axis: "x"
    right_sign: 1.0
    up_axis: "z"
    up_sign: -1.0
    yaw_sign: 1.0
    yaw_offset_deg: -90.0
    yaw_normalize: true
  max_v_m_s: 0.4
  max_yaw_rate_deg_s: 10.0
  target_motion_mode: "stationary_child"
  child_command_mode: "disabled"
  tracking_vertical_mode: "disabled"
  pre_align_axis_mode: "small_correction"
  pre_align_correction_scale: 0.25
  pre_align_max_v_m_s: 0.05
  pre_align_max_yaw_rate_deg_s: 3.0
  pre_align_buoyancy_hold_pwm: 1600
  pre_align_down_pwm_max: 1700
  pre_align_target_approach_speed_m_s: 0.03
  pre_align_approach_speed_kp: 2000
  pre_dock_approach_speed_tolerance_m_s: 0.01
  pre_align_close_loss_hold_max_distance_m: 0.15
  pre_align_docking_center_offset_camera_x_m: 0.03
  pre_align_docking_center_offset_camera_y_m: 0.06
  pre_align_docking_center_tolerance_m: 0.01
  pre_align_docking_center_release_hysteresis_m: 0.05
  docking_timeout_s: 180
  control_mode: "pid"
  control_deadband_m: 0.01
  yaw_deadband_deg: 1.0
  command_smoothing_alpha: 0.6
  kp_lateral: 0.4
  kp_vertical: 0.3
  kp_distance: 0.4
  kp_yaw: 1.0
  pid:
    forward:
      kp: 0.4
      ki: 0.0
      kd: 0.0
      integral_limit: 0.1
      output_limit: 0.4
      derivative_min_dt_s: 0.08
      d_limit: 0.05
    right:
      kp: 0.4
      ki: 0.0
      kd: 0.0
      integral_limit: 0.1
      output_limit: 0.4
      derivative_min_dt_s: 0.08
      d_limit: 0.05
    up:
      kp: 0.3
      ki: 0.0
      kd: 0.0
      integral_limit: 0.1
      output_limit: 0.4
      derivative_min_dt_s: 0.08
      d_limit: 0.05
    yaw:
      kp: 0.5
      ki: 0.0
      kd: 0.0
      integral_limit_deg: 5.0
      output_limit_deg_s: 10.0
      derivative_min_dt_s: 0.08
      d_limit: 0.05
  enable_motion: false
  allow_auto_arm_on_start: false
  output_backend: "rc_override"
  required_mode: "MANUAL"
  start_charging_after_dock: false
  min_pre_dock_valid_frames: 3
  pre_dock_recent_observation_max_age_s: 0.5
  rc_override:
    enabled: true
    neutral_pwm: 1500
    min_pwm: 1400
    max_pwm: 1600
    pwm_per_m_s: 250
    pwm_per_rad_s: 120
    min_active_pwm_offset: 30
    channels:
      forward: "ch5"
      right: "ch6"
      up: "ch3"
      yaw: "ch4"
    axis_signs:
      forward: -1.0
      right: -1.0
      up: -1.0
  pre_dock_position_tolerance_m: 0.05
  pre_dock_distance_tolerance_m: 0.05
  pre_dock_yaw_tolerance_deg: 5.0

surface_comm:
  host: "0.0.0.0"            # ✅ 本机监听所有网卡
  port: 9002               # ✅ 上位机连接端口

openmv_receiver:
  port: "/dev/ttl_bluetooth"       # ✅ 蓝牙串口接收 OpenMV 图像帧z
  baudrate: 115200

rov_video_forwarder:
  camera_id: 0               # ✅ 默认使用 /dev/video0

status_reporter:
  interval: 1.0              # ⏱️ 每秒上传一次状态（可调）

depth_forwarder:
  port: "/dev/ttyDEPTH"  # ✅ 外部压力传感器串口,3-3.4,外往里第三个，和摄像头接一起
  baudrate: 19200              # ✅ 波特率
